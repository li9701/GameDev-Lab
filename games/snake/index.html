<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>贪吃蛇·开发者版</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,"PingFang SC";background:#101827;color:#fff;min-height:100vh}.top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#172033}.top a{color:#fff;text-decoration:none}.wrap{display:grid;grid-template-columns:minmax(0,560px) 260px;gap:16px;max-width:900px;margin:auto;padding:16px}.board{position:relative;background:#0b1220;border-radius:20px;overflow:hidden;aspect-ratio:1}.board canvas{width:100%;height:100%;display:block}.panel{background:#172033;border-radius:20px;padding:16px}.panel h2{margin-top:0}.stats{font:13px ui-monospace,monospace;line-height:1.7}.row{margin:14px 0}.row label{display:flex;justify-content:space-between}.row input{width:100%}.buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}button{border:0;border-radius:10px;padding:11px;font-weight:800}.primary{background:#8ac926}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#0008}.card{background:#fff;color:#14213d;padding:22px;border-radius:18px;text-align:center}.hidden{display:none}@media(max-width:760px){.wrap{grid-template-columns:1fr}.panel{order:-1}.row{display:none}}</style></head><body><header class="top"><a href="../../index.html">← 游戏大厅</a><strong>🐍 贪吃蛇 · 开发者版</strong><span>GameDev Lab 02</span></header><main class="wrap"><section class="board"><canvas id="c" width="600" height="600"></canvas><div class="overlay" id="overlay"><div class="card"><h2 id="title">准备开始</h2><p id="msg">方向键或滑动控制蛇移动</p><button class="primary" id="start">开始游戏</button></div></div></section><aside class="panel"><h2>开发者模式</h2><div class="stats" id="stats"></div><div class="row"><label>移动速度 <b id="speedOut">7</b></label><input id="speed" type="range" min="3" max="16" value="7"></div><div class="row"><label>网格尺寸 <b>20 × 20</b></label></div><div class="buttons"><span></span><button data-dir="up">↑</button><span></span><button data-dir="left">←</button><button id="pause">暂停</button><button data-dir="right">→</button><span></span><button data-dir="down">↓</button><span></span></div><button id="reset" style="width:100%;margin-top:10px">重新开始</button></aside></main><script>(()=>{const c=document.querySelector('#c'),x=c.getContext('2d'),overlay=document.querySelector('#overlay'),stats=document.querySelector('#stats');const n=20,size=c.width/n;let snake,food,dir,nextDir,state='ready',score=0,last=0,acc=0,speed=7;function randomFood(){do{food={x:Math.floor(Math.random()*n),y:Math.floor(Math.random()*n)}}while(snake.some(s=>s.x===food.x&&s.y===food.y))}function reset(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};nextDir=dir;score=0;randomFood()}function start(){reset();state='play';overlay.classList.add('hidden')}function end(){state='over';document.querySelector('#title').textContent='游戏结束';document.querySelector('#msg').textContent=`得分 ${score} · 长度 ${snake.length}`;document.querySelector('#start').textContent='重新开始';overlay.classList.remove('hidden')}function setDir(name){const map={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}},d=map[name];if(d.x+dir.x!==0||d.y+dir.y!==0)nextDir=d}function step(){dir=nextDir;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.y<0||h.x>=n||h.y>=n||snake.some(s=>s.x===h.x&&s.y===h.y))return end();snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;randomFood()}else snake.pop()}function update(dt){if(state!=='play')return;acc+=dt;if(acc>=1/speed){acc=0;step()}}function draw(){x.fillStyle='#0b1220';x.fillRect(0,0,c.width,c.height);x.strokeStyle='#18243a';x.lineWidth=1;for(let i=0;i<=n;i++){x.beginPath();x.moveTo(i*size,0);x.lineTo(i*size,c.height);x.stroke();x.beginPath();x.moveTo(0,i*size);x.lineTo(c.width,i*size);x.stroke()}x.fillStyle='#ff595e';x.beginPath();x.arc((food.x+.5)*size,(food.y+.5)*size,size*.32,0,Math.PI*2);x.fill();snake.forEach((s,i)=>{x.fillStyle=i===0?'#c7f464':'#8ac926';x.fillRect(s.x*size+2,s.y*size+2,size-4,size-4)});x.fillStyle='#fff';x.font='bold 28px sans-serif';x.fillText(`分数 ${score}`,18,36)}function loop(t){const dt=Math.min((t-last)/1000||0,.05);last=t;update(dt);draw();stats.innerHTML=`状态: ${state}<br>方向: (${dir.x}, ${dir.y})<br>蛇长: ${snake.length}<br>食物: (${food.x}, ${food.y})<br>速度: ${speed} 格/秒<br>分数: ${score}`;requestAnimationFrame(loop)}document.querySelector('#start').onclick=start;document.querySelector('#reset').onclick=start;document.querySelector('#pause').onclick=()=>state=state==='play'?'pause':state==='pause'?'play':state;document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>setDir(b.dataset.dir));document.querySelector('#speed').oninput=e=>{speed=Number(e.target.value);document.querySelector('#speedOut').textContent=speed};window.onkeydown=e=>{const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};if(m[e.code]){e.preventDefault();setDir(m[e.code])}};let sx=0,sy=0;c.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY});c.addEventListener('pointerup',e=>{const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?'right':'left');else setDir(dy>0?'down':'up')});reset();requestAnimationFrame(loop)})();</script></body></html>
