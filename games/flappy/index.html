<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>飞翔的小鸟·开发者版</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,"PingFang SC";background:#10233c;color:#fff;min-height:100vh}.top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#172f4f}.top a{color:#fff;text-decoration:none}.layout{display:grid;grid-template-columns:minmax(0,560px) 280px;gap:16px;max-width:900px;margin:auto;padding:16px}.game{position:relative;background:#79d2f6;border-radius:20px;overflow:hidden;aspect-ratio:3/4}canvas{width:100%;height:100%;display:block}.panel{background:#172f4f;padding:16px;border-radius:20px}.panel h2{margin-top:0}.row{margin:12px 0}.row label{display:flex;justify-content:space-between;font-size:14px}.row input{width:100%}.buttons{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:10px;padding:10px 14px;font-weight:700}.primary{background:#ffb703}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#17324d55}.card{background:#fffffff0;color:#17324d;text-align:center;padding:22px;border-radius:18px}.hidden{display:none}.stats{font:13px ui-monospace,monospace;line-height:1.7}.touch{display:flex;gap:10px;margin-top:12px}.touch button{flex:1}@media(max-width:760px){.layout{grid-template-columns:1fr}.panel{order:-1}.game{max-height:68vh;margin:auto}.panel .row{display:none}.panel.open .row{display:block}}</style></head><body><header class="top"><a href="../../index.html">← 游戏大厅</a><strong>🐤 飞翔的小鸟 · 开发者版</strong><button id="devToggle">开发者面板</button></header><main class="layout"><section class="game" id="game"><canvas id="c" width="600" height="800"></canvas><div class="overlay" id="overlay"><div class="card"><h2 id="title">准备起飞</h2><p id="msg">点击画面、空格或 ↑ 起飞</p><button class="primary" id="start">开始游戏</button></div></div></section><aside class="panel" id="panel"><h2>开发者模式</h2><div class="stats" id="stats"></div><div class="row"><label>重力 <b id="gravityOut">1700</b></label><input id="gravity" type="range" min="400" max="2600" value="1700"></div><div class="row"><label>起飞力度 <b id="flapOut">-620</b></label><input id="flap" type="range" min="-900" max="-300" value="-620"></div><div class="row"><label>水管速度 <b id="speedOut">220</b></label><input id="speed" type="range" min="100" max="420" value="220"></div><div class="buttons"><button id="pause">暂停</button><button id="hitbox">碰撞框：关</button><button id="reset">重置</button></div><div class="touch"><button id="fly" class="primary">🐤 起飞</button></div></aside></main><script>(()=>{const c=document.querySelector('#c'),x=c.getContext('2d'),overlay=document.querySelector('#overlay'),title=document.querySelector('#title'),msg=document.querySelector('#msg'),stats=document.querySelector('#stats');const bird={x:160,y:360,r:22,v:0};let pipes=[],score=0,state='ready',last=performance.now(),spawn=0,showHit=false,fps=0,frames=0,fpsClock=0;const cfg={gravity:1700,flap:-620,speed:220,gap:210};function reset(){bird.y=360;bird.v=0;pipes=[];score=0;spawn=0}function start(){reset();state='play';overlay.classList.add('hidden');flap()}function flap(){if(state==='ready'||state==='over')return start();if(state==='play')bird.v=cfg.flap}function end(){state='over';title.textContent='游戏结束';msg.textContent=`得分 ${score}`;document.querySelector('#start').textContent='重新开始';overlay.classList.remove('hidden')}function addPipe(){const top=100+Math.random()*330;pipes.push({x:620,top,w:82,scored:false})}function collision(p){return bird.x+bird.r>p.x&&bird.x-bird.r<p.x+p.w&&(bird.y-bird.r<p.top||bird.y+bird.r>p.top+cfg.gap)}function update(dt){if(state!=='play')return;bird.v+=cfg.gravity*dt;bird.y+=bird.v*dt;spawn+=dt;if(spawn>1.5){spawn=0;addPipe()}for(const p of pipes){p.x-=cfg.speed*dt;if(!p.scored&&p.x+p.w<bird.x){p.scored=true;score++}if(collision(p))end()}pipes=pipes.filter(p=>p.x>-120);if(bird.y-bird.r<0||bird.y+bird.r>720)end()}function draw(){let g=x.createLinearGradient(0,0,0,800);g.addColorStop(0,'#73cef5');g.addColorStop(1,'#e2f8ff');x.fillStyle=g;x.fillRect(0,0,600,800);x.fillStyle='#55b84a';for(const p of pipes){x.fillRect(p.x,0,p.w,p.top);x.fillRect(p.x,p.top+cfg.gap,p.w,720-p.top-cfg.gap)}x.fillStyle='#d7b56d';x.fillRect(0,720,600,80);x.save();x.translate(bird.x,bird.y);x.fillStyle='#ffd23f';x.beginPath();x.arc(0,0,bird.r,0,Math.PI*2);x.fill();x.fillStyle='#ff7b00';x.beginPath();x.moveTo(18,-3);x.lineTo(38,5);x.lineTo(18,12);x.fill();x.restore();if(showHit){x.strokeStyle='red';x.lineWidth=3;x.strokeRect(bird.x-bird.r,bird.y-bird.r,bird.r*2,bird.r*2);for(const p of pipes){x.strokeRect(p.x,0,p.w,p.top);x.strokeRect(p.x,p.top+cfg.gap,p.w,720-p.top-cfg.gap)}}x.fillStyle='#17324d';x.font='bold 32px sans-serif';x.fillText(`分数 ${score}`,24,48)}function loop(t){const dt=Math.min((t-last)/1000,.033);last=t;frames++;fpsClock+=dt;if(fpsClock>=.5){fps=Math.round(frames/fpsClock);frames=0;fpsClock=0}update(dt);draw();stats.innerHTML=`FPS: ${fps}<br>状态: ${state}<br>位置 Y: ${bird.y.toFixed(1)}<br>速度: ${bird.v.toFixed(1)}<br>水管数: ${pipes.length}<br>分数: ${score}`;requestAnimationFrame(loop)}['gravity','flap','speed'].forEach(id=>{const el=document.querySelector('#'+id),out=document.querySelector('#'+id+'Out');el.oninput=()=>{cfg[id]=Number(el.value);out.textContent=el.value}});document.querySelector('#start').onclick=start;document.querySelector('#fly').onclick=flap;c.onpointerdown=flap;window.onkeydown=e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap()}};document.querySelector('#pause').onclick=()=>{state=state==='play'?'pause':state==='pause'?'play':state};document.querySelector('#hitbox').onclick=e=>{showHit=!showHit;e.target.textContent='碰撞框：'+(showHit?'开':'关')};document.querySelector('#reset').onclick=()=>{state='ready';reset();overlay.classList.remove('hidden')};document.querySelector('#devToggle').onclick=()=>document.querySelector('#panel').classList.toggle('open');requestAnimationFrame(loop)})();</script></body></html>
